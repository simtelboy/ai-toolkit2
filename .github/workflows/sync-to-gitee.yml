name: Sync ai-toolkit2 to Gitee (Simple Version)

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mirror-repo:
    name: Mirror Repository to Gitee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        run: |
          # 配置 Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 添加 Gitee 远程仓库（使用 token 认证）
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/ai-toolkit2-mirror.git
          
          # 推送所有分支和标签
          git push -f gitee --all
          git push -f gitee --tags
          
          echo "✅ Code synced to Gitee"

  sync-release:
    name: Sync Release to Gitee
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download GitHub Release Assets
        run: |
          mkdir -p assets
          cd assets
          
          # 获取 release 信息
          RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.release.tag_name }}")
          
          # 下载所有资产
          echo "$RELEASE_DATA" | jq -r '.assets[] | .browser_download_url' | while read url; do
            echo "Downloading: $url"
            curl -L -O "$url"
          done
          
          ls -lh
          
          # 保存 release 信息
          echo "$RELEASE_DATA" > ../release_info.json

      - name: Create Gitee Release
        run: |
          # 读取 release 信息
          TAG_NAME="${{ github.event.release.tag_name }}"
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_BODY=$(echo '${{ github.event.release.body }}' | jq -Rs .)
          
          # 创建 Gitee release
          RESPONSE=$(curl -X POST \
            "https://gitee.com/api/v5/repos/${{ secrets.GITEE_USERNAME }}/ai-toolkit2-mirror/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${{ secrets.GITEE_TOKEN }}\",
              \"tag_name\": \"$TAG_NAME\",
              \"name\": \"$RELEASE_NAME\",
              \"body\": $RELEASE_BODY,
              \"prerelease\": false
            }")
          
          echo "Response: $RESPONSE"
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "❌ Failed to create release"
            echo "$RESPONSE"
            exit 1
          fi
          
          echo "✅ Created Gitee release: $RELEASE_ID"
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV

      - name: Upload Assets to Gitee
        run: |
          cd assets
          for file in *; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              
              curl -X POST \
                "https://gitee.com/api/v5/repos/${{ secrets.GITEE_USERNAME }}/ai-toolkit2-mirror/releases/${{ env.RELEASE_ID }}/attach_files" \
                -F "access_token=${{ secrets.GITEE_TOKEN }}" \
                -F "file=@$file"
              
              echo "✅ Uploaded: $file"
            fi
          done
